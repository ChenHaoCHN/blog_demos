spring.application.name=simple-advisor
server.port=8080

# 允许 bean 定义覆盖
spring.main.allow-bean-definition-overriding=true

# 阿里云 DashScope API Key（建议通过环境变量注入，硬编码仅测试使用）
spring.ai.openai.api-key=your-api-key

# 关键：使用 DashScope 的 OpenAI 兼容模式端点
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode

# 模型配置（qwen-max 或 qwen-max-latest）
spring.ai.openai.chat.options.model=qwen-max
spring.ai.openai.chat.options.temperature=0.7

# 启用详细日志
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.web.client=INFO