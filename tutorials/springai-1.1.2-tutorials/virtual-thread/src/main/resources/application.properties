spring.application.name=virtual-thread
server.port=8080

# Tomcat线程池配置，最大线程数
server.tomcat.threads.max=100
# Tomcat线程池配置，最小空闲线程数
server.tomcat.threads.min-spare=2
# Tomcat最大连接数（默认8192）
server.tomcat.max-connections=8192
# Tomcat等待队列大小（增加到5000以支持超高并发压测）
server.tomcat.accept-count=5000

# ========================================
# 虚拟线程配置（关键配置）
# ========================================

# false: 使用传统线程模式
# true: 使用虚拟线程模式
spring.threads.virtual.enabled=true
